<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 318" fill="none">
  <g stroke="#2B6CB0" stroke-width="5" stroke-linejoin="miter" stroke-linecap="butt">

    <!-- MAIN TOWER — tall outer rectangle -->
    <rect x="5" y="8" width="60" height="232"/>

    <!-- WINDOW inside main tower — tall inner rectangle -->
    <rect x="19" y="24" width="34" height="152"/>

    <!-- SHORT PILLAR — separate, to the right of the main tower -->
    <rect x="73" y="118" width="24" height="122"/>

    <!-- BASELINE — horizontal, from tower base to far right -->
    <line x1="5" y1="240" x2="778" y2="240"/>

    <!-- PEAK 1 — left, lower peak; left base starts at pillar's right edge -->
    <polyline points="97,240 193,143 286,240"/>

    <!-- PEAK 2 — right, taller peak; very long right slope to far right corner -->
    <polyline points="286,240 430,74 778,240"/>

  </g>

  <!-- Arabic company name -->
  <text x="430" y="276"
    font-family="'Noto Naskh Arabic','Traditional Arabic','Arial Unicode MS',serif"
    font-size="24" fill="#2B6CB0" text-anchor="middle">البناء العريق للمقاولات والصيانة العامة</text>

  <!-- English company name -->
  <text x="430" y="308"
    font-family="Arial,Helvetica,sans-serif" font-size="11.5"
    fill="#2B6CB0" text-anchor="middle" letter-spacing="2.8">ALBINA ALAREEQ CONTRACTING &amp; GENERAL MAINTENANCE</text>
</svg>
